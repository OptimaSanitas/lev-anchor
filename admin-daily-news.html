<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SolaNa Seeker — Daily X News Updater</title>
  <style>
    body {font-family: system-ui; background:#0A0A0A; color:#00FF9D; padding:30px; max-width:900px; margin:0 auto;}
    h1 {color:#00FF9D;}
    button {background:#00C853; color:#000; border:none; padding:16px 28px; font-size:18px; font-weight:700; border-radius:12px; cursor:pointer; margin:8px 0;}
    .redButton {background:#FF3D00 !important;}
    .tealButton {background:#00B8D4 !important;}
    input, textarea, select {width:100%; background:#111; color:#0F0; padding:14px; border-radius:12px; border:2px solid #00FF9D; margin-bottom:12px; font-size:16px;}
    .post {background:#1E1E1E; padding:16px; border-radius:12px; margin-bottom:12px;}
    .status {font-size:16px; padding:12px; border-radius:12px; background:#1E1E1E; margin:12px 0;}
    .note {background:#1E1E1E; padding:14px; border-radius:12px; font-size:15px; margin-top:20px;}
  </style>
  <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
</head>
<body>
  <h1>📰 SolaNa Seeker Daily X News Updater</h1>
  
  <button onclick="connectWallet()">🔗 CONNECT WALLET (Seed Vault)</button>
  <button onclick="showPdaOnSolscan()">🔎 View PDA on Solscan</button>
  <button onclick="showCurrentNewsFromPda()" class="tealButton">🔍 Show Current On-Chain JSON</button>
  
  <div id="status" class="status">READY — paste 6 links (Main + 5 replies) → Add Full Thread → UPDATE</div>

  <input id="urlInput" type="text" placeholder="Paste 6 comma-separated X links: Main post first, then 5 replies" />

  <button onclick="addSingleThread()" class="tealButton">➕ Add Full Thread (Main + 5 replies)</button>
  <button onclick="updateDailyNews()" class="tealButton">🚀 UPDATE DAILY NEWS ON-CHAIN (devnet)</button>

  <div id="postList"></div>

  <div class="note">
    ✅ New format: 6 links total (Main post first, then 5 sub/replies)<br>
    ✅ The first link becomes the main post, the other 5 go into postIds<br>
    ✅ This will look much better in the App.tsx news feed
  </div>

  <script>
    let provider = null;
    let connection;
    let PROGRAM_ID;
    let posts = [];

    window.addEventListener('load', () => {
      connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
      PROGRAM_ID = new solanaWeb3.PublicKey("8VX7TDKB4U1LR3RT8wYpF4kEUGuimgyJDnv6LwtFA1FB");
      document.getElementById("status").innerHTML = `<strong style="color:#00FF9D">READY — paste 6 links (Main first) → Add Full Thread</strong>`;
      renderPostList();
    });

    async function connectWallet() {
      const statusEl = document.getElementById("status");
      if (!window.solana) return alert("No wallet detected");
      provider = window.solana;
      try {
        await provider.connect();
        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ CONNECTED</strong>`;
      } catch (e) { statusEl.innerHTML = `<strong style="color:#FF3D00">Connect failed</strong>`; }
    }

    async function showPdaOnSolscan() {
      const [pda] = await solanaWeb3.PublicKey.findProgramAddress([new TextEncoder().encode("daily-news-seeker-final")], PROGRAM_ID);
      window.open(`https://solscan.io/account/${pda}?cluster=devnet`, "_blank");
    }

    async function showCurrentNewsFromPda() {
      try {
        const [pda] = await solanaWeb3.PublicKey.findProgramAddress([new TextEncoder().encode("daily-news-seeker-final")], PROGRAM_ID);
        const account = await connection.getAccountInfo(pda);
        if (!account) return alert("PDA not created yet");
        const offset = 8;
        const len = account.data.readUInt32LE(offset);
        const json = account.data.slice(offset + 4, offset + 4 + len).toString();
        alert("✅ CURRENT ON-CHAIN JSON:\n\n" + json);
      } catch(e){ alert("Debug error: " + e.message); }
    }

  function addSingleThread() {
      const input = document.getElementById("urlInput").value.trim();
      if (!input) return alert("Paste the 6 links separated by commas");

      const links = input.split(',').map(l => l.trim()).filter(l => l);
      if (links.length < 5 || links.length > 6) {
        return alert("Please enter 5 or 6 full X links separated by commas");
      }

      const today = new Date().toLocaleDateString('en-US', {month:'short', day:'2-digit', year:'numeric'});

      posts.push({
        id: `thread-${Date.now()}`,
        date: today,
        title: "Daily Longevity Thread",
        content: `Full ${links.length}-post thread from @optima_sanitas`,
        postUrls: links,                    // ← NOW STORES FULL LINKS
        postIds: links.map(link => {        // keep old field for safety during transition
          const match = link.match(/status\/(\d+)/);
          return match ? match[1] : link;
        }),
        videoTag: "Video1",
        videoUrl: ""
      });

      console.log(`✅ Thread added with ${links.length} full URLs`);
      alert(`✅ ${links.length}-post thread with FULL links added!\nNow click UPDATE DAILY NEWS`);
      renderPostList();
      document.getElementById("urlInput").value = "";
    }

    function renderPostList() {
      const container = document.getElementById("postList");
      container.innerHTML = `<h3 style="color:#00FF9D">Posts ready today (${posts.length})</h3>`;
      if (posts.length === 0) {
        container.innerHTML += `<p style="color:#888">No threads added yet</p>`;
        return;
      }
      posts.forEach((post, i) => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <p><strong>Thread #${i+1}</strong> — Main + 5 replies</p>
          <label>Title</label><input type="text" value="${post.title}" onchange="posts[${i}].title = this.value" />
          <label>Content Summary</label><textarea onchange="posts[${i}].content = this.value">${post.content}</textarea>
          <label>Video URL (optional)</label>
          <input type="text" value="${post.videoUrl}" onchange="posts[${i}].videoUrl = this.value" placeholder="https://video.twimg.com/..." />
          <button onclick="posts.splice(${i},1); renderPostList();" style="background:#FF3D00; font-size:14px; padding:8px 16px;">Remove Thread</button>
        `;
        container.appendChild(div);
      });
    }

    async function updateDailyNews() {
      if (!provider) return alert("Connect wallet first");
      if (posts.length === 0) return alert("Add the thread first");

      const newsJson = JSON.stringify(posts, null, 2);
      console.log("🧪 JSON to send:", newsJson);
      alert("✅ JSON size: " + newsJson.length + " bytes");

      if (newsJson.length > 12000) return alert(`❌ JSON too big (${newsJson.length} bytes)`);

      try {
        const [dailyNewsPda] = await solanaWeb3.PublicKey.findProgramAddress([new TextEncoder().encode("daily-news-seeker-final")], PROGRAM_ID);

        const discriminator = new Uint8Array([34, 136, 110, 102, 49, 52, 170, 48]);

        const jsonBytes = new TextEncoder().encode(newsJson);
        const lengthBuf = new Uint8Array(4);
        new DataView(lengthBuf.buffer).setUint32(0, jsonBytes.length, true);

        const data = new Uint8Array(8 + 4 + jsonBytes.length);
        data.set(discriminator, 0);
        data.set(lengthBuf, 8);
        data.set(jsonBytes, 12);

        const ix = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: dailyNewsPda, isSigner: false, isWritable: true },
            { pubkey: provider.publicKey, isSigner: true, isWritable: true },
            { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false }
          ],
          programId: PROGRAM_ID,
          data: data
        });

        const { blockhash } = await connection.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction().add(ix);
        tx.recentBlockhash = blockhash;
        tx.feePayer = provider.publicKey;

        const signedTx = await provider.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true, preflightCommitment: "confirmed" });

        alert(`✅ SUCCESS! Daily news updated on-chain\nTx: ${signature.slice(0,12)}...`);
        document.getElementById("status").innerHTML = `<strong style="color:#00FF9D">✅ LIVE ON-CHAIN — refresh Seeker app news feed!</strong>`;
      } catch (e) {
        console.error(e);
        alert(`❌ Update failed:\n${e.message}\n\nCheck console for details`);
      }
    }
  </script>
</body>
</html>
