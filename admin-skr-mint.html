  <script>

    const ASSOCIATED_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL");
    const SYSTEM_PROGRAM_ID = new solanaWeb3.PublicKey("11111111111111111111111111111111");

    // === YOUR EXACT HELIUS DEVNET RPC ===
    window.addEventListener('load', () => {
      connection = new solanaWeb3.Connection("https://devnet.helius-rpc.com/?api-key=bcb31616-628f-4afc-ab24-82980bb8ea55", "confirmed");
      console.log("✅ Admin HTML loaded with Helius Devnet RPC");
    });

    // === TEST BUTTON (confirms clicks work) ===
    window.testJS = function() {
      alert("✅ JS is working! Button clicks are active.");
      console.log("🧪 Test button clicked successfully");
    };

    async function connectWallet() {
      if (!window.solana) return alert("No wallet detected");
      provider = window.solana;
      await provider.connect();
      document.getElementById("status").innerHTML = `<strong style="color:#00FF9D">✅ ADMIN WALLET CONNECTED</strong>`;
    }

    // === FIXED + FULLY DEBUGGED ATA CREATION (manual, no missing functions) ===
    window.createRewardPoolATA = async function() {
      console.log("🚀 createRewardPoolATA() called");
      if (!provider) {
        alert("❌ Connect admin wallet first");
        return;
      }

      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `<strong style="color:#FF9800">Creating Reward Pool ATA (PDA-owned)...</strong>`;

      try {
        console.log("Step 1: Finding reward-pool PDA");
        const [rewardPoolPda] = solanaWeb3.PublicKey.findProgramAddressSync([new TextEncoder().encode("reward-pool")], PROGRAM_ID);
        console.log("PDA:", rewardPoolPda.toString());

        console.log("Step 2: Calculating ATA address");
        const [ata] = solanaWeb3.PublicKey.findProgramAddressSync(
          [rewardPoolPda.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), SKR_MINT.toBuffer()],
          ASSOCIATED_TOKEN_PROGRAM_ID
        );
        console.log("ATA:", ata.toString());

        console.log("Step 3: Building instruction");
        const ix = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: provider.publicKey, isSigner: true, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: rewardPoolPda, isSigner: false, isWritable: false },
            { pubkey: SKR_MINT, isSigner: false, isWritable: false },
            { pubkey: SYSTEM_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: ASSOCIATED_TOKEN_PROGRAM_ID, isSigner: false, isWritable: false }
          ],
          programId: ASSOCIATED_TOKEN_PROGRAM_ID,
          data: new Uint8Array(0)
        });

        console.log("Step 4: Getting blockhash");
        const { blockhash } = await connection.getLatestBlockhash();

        console.log("Step 5: Building & signing tx");
        const tx = new solanaWeb3.Transaction().add(ix);
        tx.recentBlockhash = blockhash;
        tx.feePayer = provider.publicKey;

        const signedTx = await provider.signTransaction(tx);
        console.log("Step 6: Sending raw tx");
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true });

        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ REWARD POOL ATA CREATED SUCCESSFULLY</strong>`;
        alert(`✅ Reward Pool ATA created!\nSignature: ${signature.slice(0,12)}...`);
        console.log("✅ FULL SUCCESS — Signature:", signature);
      } catch (e) {
        console.error("❌ createRewardPoolATA failed:", e);
        statusEl.innerHTML = `<strong style="color:#FF3D00">Failed</strong>`;
        alert("ATA creation error:\n" + e.message);
      }
    }; 

    // === COMPLETED: Bootstrap Pool ATA (same pattern as Reward Pool) ===
    window.createBootstrapPoolATA = async function() {
      if (!provider) return alert("❌ Connect admin wallet first");
      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `<strong style="color:#FF9800">Creating Bootstrap Pool ATA...</strong>`;
      try {
        const [bootstrapPda] = solanaWeb3.PublicKey.findProgramAddressSync([new TextEncoder().encode("bootstrap-pool")], PROGRAM_ID);
        const [ata] = solanaWeb3.PublicKey.findProgramAddressSync([bootstrapPda.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), SKR_MINT.toBuffer()], ASSOCIATED_TOKEN_PROGRAM_ID);
        const ix = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: provider.publicKey, isSigner: true, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: bootstrapPda, isSigner: false, isWritable: false },
            { pubkey: SKR_MINT, isSigner: false, isWritable: false },
            { pubkey: SYSTEM_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: ASSOCIATED_TOKEN_PROGRAM_ID, isSigner: false, isWritable: false }
          ],
          programId: ASSOCIATED_TOKEN_PROGRAM_ID,
          data: new Uint8Array(0)
        });
        const { blockhash } = await connection.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction().add(ix);
        tx.recentBlockhash = blockhash; tx.feePayer = provider.publicKey;
        const signedTx = await provider.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true });
        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ Bootstrap Pool ATA created</strong>`;
        alert(`✅ Bootstrap ATA ready!\n${ata.toString().slice(0,12)}...`);
      } catch (e) { console.error(e); alert("Bootstrap ATA error: " + e.message); }
    };

    // === COMPLETED: Fund Bootstrap Pool (transfers SKR from admin to PDA-owned ATA) ===
    window.fundBootstrapPool = async function(amountSk) {
      if (!provider) return alert("❌ Connect admin wallet first");
      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `<strong style="color:#FF9800">Funding Bootstrap Pool with ${amountSk} SKR...</strong>`;
      try {
        const [bootstrapPda] = solanaWeb3.PublicKey.findProgramAddressSync([new TextEncoder().encode("bootstrap-pool")], PROGRAM_ID);
        const [ata] = solanaWeb3.PublicKey.findProgramAddressSync([bootstrapPda.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), SKR_MINT.toBuffer()], ASSOCIATED_TOKEN_PROGRAM_ID);
        // NOTE: This assumes admin has SKR in their associated token account. Adjust if needed.
        const adminAta = await solanaWeb3.getAssociatedTokenAddress(SKR_MINT, provider.publicKey);
        const amount = BigInt(amountSk) * 1_000_000_000n; // 9 decimals
        const transferIx = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: adminAta, isSigner: false, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: provider.publicKey, isSigner: true, isWritable: false },
            { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false }
          ],
          programId: TOKEN_PROGRAM_ID,
          data: new Uint8Array([3, ...new Uint8Array(new BigUint64Array([amount]).buffer)]) // Transfer instruction
        });
        const { blockhash } = await connection.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction().add(transferIx);
        tx.recentBlockhash = blockhash; tx.feePayer = provider.publicKey;
        const signedTx = await provider.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true });
        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ Funded ${amountSk} SKR to Bootstrap Pool</strong>`;
        alert(`✅ Success! Tx: ${signature.slice(0,12)}...`);
      } catch (e) { console.error(e); alert("Fund error: " + e.message); }
    };

    window.debugMintConfigAuthority = async function() { /* your original debug code */ alert("Debug MintConfig - check console"); };

    window.viewRewardPoolATA = async function() {
      try {
        const [pda] = await solanaWeb3.PublicKey.findProgramAddress([new TextEncoder().encode("reward-pool")], PROGRAM_ID);

    window.viewBootstrapPoolATA = async function() {

        const [ata] = await solanaWeb3.PublicKey.findProgramAddress([pda.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), SKR_MINT.toBuffer()], ASSOCIATED_TOKEN_PROGRAM_ID);

    window.createStakeVaultATA = async function() {
      if (!provider) return alert("❌ Connect admin wallet first");
      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `<strong style="color:#FF9800">Creating Stake Vault ATA...</strong>`;
      try {
        const [stakeVaultPda] = solanaWeb3.PublicKey.findProgramAddressSync([new TextEncoder().encode("stake-vault")], PROGRAM_ID);
        const [ata] = solanaWeb3.PublicKey.findProgramAddressSync([stakeVaultPda.toBuffer(), TOKEN_PROGRAM_ID.toBuffer(), SKR_MINT.toBuffer()], ASSOCIATED_TOKEN_PROGRAM_ID);
        const ix = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: provider.publicKey, isSigner: true, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: stakeVaultPda, isSigner: false, isWritable: false },
            { pubkey: SKR_MINT, isSigner: false, isWritable: false },
            { pubkey: SYSTEM_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: TOKEN_PROGRAM_ID, isSigner: false, isWritable: false },
            { pubkey: ASSOCIATED_TOKEN_PROGRAM_ID, isSigner: false, isWritable: false }
          ],
          programId: ASSOCIATED_TOKEN_PROGRAM_ID,
          data: new Uint8Array(0)
        });
        const { blockhash } = await connection.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction().add(ix);
        tx.recentBlockhash = blockhash; tx.feePayer = provider.publicKey;
        const signedTx = await provider.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true });
        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ Stake Vault ATA created</strong>`;
        alert(`✅ Stake Vault ATA ready!\n${ata.toString().slice(0,12)}...`);
      } catch (e) { console.error(e); alert("Stake Vault error: " + e.message); }
    };

    // === REUSABLE DEVNET GENESIS MINT (desktop wallet signs everything) ===
    window.createDevnetGenesisMint = async function() {
      if (!provider) return alert("❌ Connect your desktop admin wallet first (B9Qo...)");
      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `<strong style="color:#FF9800">Minting Genesis NFT to phone wallet via desktop wallet...</strong>`;
      try {
        const TOKEN_2022_PROGRAM_ID = new solanaWeb3.PublicKey("TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb");
        const MINT = new solanaWeb3.PublicKey("44CoBuympqkridwmSenL5DhkGX9SPALWTotwQsMfDzjy");
        const PHONE_WALLET = new solanaWeb3.PublicKey("2PAdkp9KzVCkasajrvMGjBTgdYXmtgLCG4HembfTQ3jv");
        const ASSOCIATED_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL");
        const [ata] = await solanaWeb3.PublicKey.findProgramAddress([PHONE_WALLET.toBuffer(), TOKEN_2022_PROGRAM_ID.toBuffer(), MINT.toBuffer()], ASSOCIATED_TOKEN_PROGRAM_ID);
        const createAtaIx = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: provider.publicKey, isSigner: true, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: PHONE_WALLET, isSigner: false, isWritable: false },
            { pubkey: MINT, isSigner: false, isWritable: false },
            { pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false },
            { pubkey: TOKEN_2022_PROGRAM_ID, isSigner: false, isWritable: false }
          ],
          programId: ASSOCIATED_TOKEN_PROGRAM_ID,
          data: new Uint8Array(0)
        });
        const mintToData = new Uint8Array(9); mintToData[0] = 7; mintToData[1] = 1;
        const mintToIx = new solanaWeb3.TransactionInstruction({
          keys: [
            { pubkey: MINT, isSigner: false, isWritable: true },
            { pubkey: ata, isSigner: false, isWritable: true },
            { pubkey: provider.publicKey, isSigner: true, isWritable: false }
          ],
          programId: TOKEN_2022_PROGRAM_ID,
          data: mintToData
        });
        const { blockhash } = await connection.getLatestBlockhash();
        const tx = new solanaWeb3.Transaction().add(createAtaIx).add(mintToIx);
        tx.recentBlockhash = blockhash; tx.feePayer = provider.publicKey;
        const signedTx = await provider.signTransaction(tx);
        const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: true });
        statusEl.innerHTML = `<strong style="color:#00FF9D">✅ GENESIS NFT MINTED TO PHONE WALLET</strong>`;
        alert(`✅ Success! Signature: ${signature}`);
      } catch (e) { console.error(e); statusEl.innerHTML = `<strong style="color:#FF3D00">Failed</strong>`; alert("Error: " + e.message); }
    };

    window.debugMintConfigAuthority = async function() { alert("Run your original debug logic here"); };
    window.viewMintConfigOnSolscan = function() { window.open(`https://solscan.io/account/${PROGRAM_ID}?cluster=devnet`, "_blank"); };
